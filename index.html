<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Química Pro - Dylan Arias</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .quiz-container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-style: italic; }
        .question-box { background: #ebf2ff; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .question-type { font-size: 0.8rem; color: #1a73e8; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .question-text { font-size: 1.4rem; font-weight: bold; color: #34495e; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button {
            padding: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            background-color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover:not(:disabled) { border-color: #1a73e8; background: #f0f7ff; }
        .correct { background-color: #27ae60 !important; color: white !important; border-color: #27ae60 !important; }
        .incorrect { background-color: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
        .feedback { margin-top: 15px; font-weight: bold; height: 20px; }
        .stats { margin-top: 20px; font-size: 0.9rem; color: #7f8c8d; }
        footer { margin-top: 20px; color: #95a5a6; font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Examen de Tabla Periódica</h1>
    <div class="subtitle">Dominando Grupos, Bloques y Familias</div>

    <div id="quiz-ui">
        <div class="question-box">
            <div id="q-type" class="question-type"></div>
            <div id="q-text" class="question-text">Cargando pregunta...</div>
        </div>
        <div class="options" id="options-btn"></div>
        <div id="feedback" class="feedback"></div>
        <div class="stats">Aciertos: <span id="hits">0</span> | Pregunta: <span id="current-q">0</span>/65</div>
    </div>

    <div id="final-screen" class="hidden">
        <h2>¡Resultado Final!</h2>
        <p id="final-msg"></p>
        <button onclick="location.reload()" style="background: #1a73e8; color: white; width: 100%;">Reiniciar Repaso</button>
    </div>
</div>

<footer>Hecho por <b>Dylan Arias</b></footer>

<script>
    // Base de datos completa basada en tu lista
    const elementos = [
        {n:"Actinio", s:"Ac", g:"3", b:"f", f:"Actínidos", c:"Metal"},
        {n:"Aluminio", s:"Al", g:"13", b:"p", f:"Térreos", c:"Metal"},
        {n:"Antimonio", s:"Sb", g:"15", b:"p", f:"Nitrogenoideos", c:"Metaloide"},
        {n:"Argón", s:"Ar", g:"18", b:"p", f:"Gases Nobles", c:"No Metal"},
        {n:"Arsénico", s:"As", g:"15", b:"p", f:"Nitrogenoideos", c:"Metaloide"},
        {n:"Astato", s:"At", g:"17", b:"p", f:"Halógenos", c:"Metaloide"},
        {n:"Azufre", s:"S", g:"16", b:"p", f:"Anfígenos", c:"No Metal"},
        {n:"Bario", s:"Ba", g:"2", b:"s", f:"Alcalinotérreos", c:"Metal"},
        {n:"Berilio", s:"Be", g:"2", b:"s", f:"Alcalinotérreos", c:"Metal"},
        {n:"Bismuto", s:"Bi", g:"15", b:"p", f:"Nitrogenoideos", c:"Metal"},
        {n:"Boro", s:"B", g:"13", b:"p", f:"Térreos", c:"Metaloide"},
        {n:"Bromo", s:"Br", g:"17", b:"p", f:"Halógenos", c:"No Metal"},
        {n:"Cadmio", s:"Cd", g:"12", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Calcio", s:"Ca", g:"2", b:"s", f:"Alcalinotérreos", c:"Metal"},
        {n:"Carbono", s:"C", g:"14", b:"p", f:"Carbonoideos", c:"No Metal"},
        {n:"Cesio", s:"Cs", g:"1", b:"s", f:"Alcalinos", c:"Metal"},
        {n:"Cloro", s:"Cl", g:"17", b:"p", f:"Halógenos", c:"No Metal"},
        {n:"Cobalto", s:"Co", g:"9", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Cobre", s:"Cu", g:"11", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Cromo", s:"Cr", g:"6", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Escandio", s:"Sc", g:"3", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Estaño", s:"Sn", g:"14", b:"p", f:"Carbonoideos", c:"Metal"},
        {n:"Estroncio", s:"Sr", g:"2", b:"s", f:"Alcalinotérreos", c:"Metal"},
        {n:"Flúor", s:"F", g:"17", b:"p", f:"Halógenos", c:"No Metal"},
        {n:"Fósforo", s:"P", g:"15", b:"p", f:"Nitrogenoideos", c:"No Metal"},
        {n:"Francio", s:"Fr", g:"1", b:"s", f:"Alcalinos", c:"Metal"},
        {n:"Galio", s:"Ga", g:"13", b:"p", f:"Térreos", c:"Metal"},
        {n:"Germanio", s:"Ge", g:"14", b:"p", f:"Carbonoideos", c:"Metaloide"},
        {n:"Helio", s:"He", g:"18", b:"s", f:"Gases Nobles", c:"No Metal"},
        {n:"Hidrógeno", s:"H", g:"1", b:"s", f:"No Metales", c:"No Metal"},
        {n:"Hierro", s:"Fe", g:"8", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Indio", s:"In", g:"13", b:"p", f:"Térreos", c:"Metal"},
        {n:"Kriptón", s:"Kr", g:"18", b:"p", f:"Gases Nobles", c:"No Metal"},
        {n:"Lantano", s:"La", g:"3", b:"f", f:"Lantánidos", c:"Metal"},
        {n:"Litio", s:"Li", g:"1", b:"s", f:"Alcalinos", c:"Metal"},
        {n:"Magnesio", s:"Mg", g:"2", b:"s", f:"Alcalinotérreos", c:"Metal"},
        {n:"Manganeso", s:"Mn", g:"7", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Mercurio", s:"Hg", g:"12", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Molibdeno", s:"Mo", g:"6", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Neón", s:"Ne", g:"18", b:"p", f:"Gases Nobles", c:"No Metal"},
        {n:"Níquel", s:"Ni", g:"10", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Nitrógeno", s:"N", g:"15", b:"p", f:"Nitrogenoideos", c:"No Metal"},
        {n:"Oro", s:"Au", g:"11", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Oxígeno", s:"O", g:"16", b:"p", f:"Anfígenos", c:"No Metal"},
        {n:"Paladio", s:"Pd", g:"10", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Plata", s:"Ag", g:"11", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Platino", s:"Pt", g:"10", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Plomo", s:"Pb", g:"14", b:"p", f:"Carbonoideos", c:"Metal"},
        {n:"Plutonio", s:"Pu", g:"-", b:"f", f:"Actínidos", c:"Metal"},
        {n:"Polonio", s:"Po", g:"16", b:"p", f:"Anfígenos", c:"Metaloide"},
        {n:"Potasio", s:"K", g:"1", b:"s", f:"Alcalinos", c:"Metal"},
        {n:"Radio", s:"Ra", g:"2", b:"s", f:"Alcalinotérreos", c:"Metal"},
        {n:"Radón", s:"Rn", g:"18", b:"p", f:"Gases Nobles", c:"No Metal"},
        {n:"Rubidio", s:"Rb", g:"1", b:"s", f:"Alcalinos", c:"Metal"},
        {n:"Selenio", s:"Se", g:"16", b:"p", f:"Anfígenos", c:"No Metal"},
        {n:"Silicio", s:"Si", g:"14", b:"p", f:"Carbonoideos", c:"Metaloide"},
        {n:"Sodio", s:"Na", g:"1", b:"s", f:"Alcalinos", c:"Metal"},
        {n:"Talio", s:"Tl", g:"13", b:"p", f:"Térreos", c:"Metal"},
        {n:"Tecnecio", s:"Tc", g:"7", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Titanio", s:"Ti", g:"4", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Uranio", s:"U", g:"-", b:"f", f:"Actínidos", c:"Metal"},
        {n:"Vanadio", s:"V", g:"5", b:"d", f:"Metales de Transición", c:"Metal"},
        {n:"Xenón", s:"Xe", g:"18", b:"p", f:"Gases Nobles", c:"No Metal"},
        {n:"Yodo", s:"I", g:"17", b:"p", f:"Halógenos", c:"No Metal"},
        {n:"Zinc", s:"Zn", g:"12", b:"d", f:"Metales de Transición", c:"Metal"}
    ];

    let currentQ = 0;
    let hits = 0;
    let shuffledElements = [];

    function init() {
        shuffledElements = [...elementos].sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        if(currentQ >= shuffledElements.length) return finish();
        
        const el = shuffledElements[currentQ];
        const types = ['s', 'n', 'g', 'b', 'f', 'c'];
        const randType = types[Math.floor(Math.random() * types.length)];
        
        let question = "";
        let correct = "";
        let category = "";
        let pool = [];

        switch(randType) {
            case 's': category="Símbolo"; question=`¿Símbolo de ${el.n}?`; correct=el.s; pool=elementos.map(i=>i.s); break;
            case 'n': category="Nombre"; question=`¿Qué elemento es ${el.s}?`; correct=el.n; pool=elementos.map(i=>i.n); break;
            case 'g': category="Grupo"; question=`¿Grupo de ${el.n}?`; correct=el.g; pool=elementos.map(i=>i.g); break;
            case 'b': category="Bloque"; question=`¿Bloque de ${el.n}?`; correct=el.b; pool=['s','p','d','f']; break;
            case 'f': category="Familia"; question=`¿Familia de ${el.n}?`; correct=el.f; pool=elementos.map(i=>i.f); break;
            case 'c': category="Tipo"; question=`¿Clasificación de ${el.n}?`; correct=el.c; pool=['Metal','No Metal','Metaloide']; break;
        }

        document.getElementById('q-type').textContent = category;
        document.getElementById('q-text').textContent = question;
        
        let opts = [correct];
        while(opts.length < 4) {
            let r = pool[Math.floor(Math.random() * pool.length)];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-btn');
        container.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.textContent = o;
            b.onclick = () => check(o, correct, b);
            container.appendChild(b);
        });
        document.getElementById('current-q').textContent = currentQ + 1;
    }

    function check(sel, cor, btn) {
        const btns = document.querySelectorAll('#options-btn button');
        btns.forEach(b => b.disabled = true);
        if(sel === cor) {
            hits++;
            btn.classList.add('correct');
            document.getElementById('feedback').textContent = "¡Correcto!";
        } else {
            btn.classList.add('incorrect');
            document.getElementById('feedback').textContent = `Era: ${cor}`;
        }
        document.getElementById('hits').textContent = hits;
        setTimeout(() => {
            currentQ++;
            document.getElementById('feedback').textContent = "";
            showQuestion();
        }, 1500);
    }

    function finish() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('final-screen').classList.remove('hidden');
        document.getElementById('final-msg').textContent = `Dominas ${hits} de ${elementos.length} conceptos.`;
    }

    init();
</script>
</body>
</html>
